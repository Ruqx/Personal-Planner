<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Persistent Customizable Calendar</title>
    <link rel="stylesheet" href="calender.css" />
    <link rel="stylesheet" href="../navbar/navbar.css" />
</head>
<body data-theme="default" data-font="quicksand">

    <div class="top-panel">
        <div class="top-panel-content">
            <h1>My Awesome Month</h1>
            <p>A personal planner & journal</p>
        </div>
    </div>

<div id="my-navbar-container">
  <div class="navbarContainer" id="navbar">
    <div class="cut" id="cut"></div>
    <div class="indicator" id="indicator">🏠</div>
    <div class="nav-item active" data-icon="🏠" data-color="#FFD1DC" data-link="../index.html">🏠</div>
    <div class="nav-item" data-icon="🔔" data-color="#C1F0F6" data-link="../goals/goals.html">🔔</div>
    <div class="nav-item" data-icon="💬" data-color="#FFF1B5" data-link="../notes/notes.html">💬</div>
    <div class="nav-item" data-icon="👤" data-color="#D6C1FF" data-link="../mindmap/mindmap.html">👤</div>
    <div class="nav-item" data-icon="📅" data-color="#A7F0BA" data-link="/calender/calender.html">📅</div>
    <div class="nav-item" data-icon="📋" data-color="#F0C6A7" data-link="../kanban/kanban.html">📋</div>
  </div>
</div>

    <div class="calendar-container">
        <div class="calendar-header">
            <button id="prevMonth" class="nav-btn">&lt; Prev</button>
            <h2 id="monthYear"></h2>
            <button id="nextMonth" class="nav-btn">Next &gt;</button>
            <button id="customizeBtn" class="nav-btn">⚙️ Customize</button>
        </div>
        <div class="calendar-grid day-headers">
            <div class="day-header">Sun</div>
            <div class="day-header">Mon</div>
            <div class="day-header">Tue</div>
            <div class="day-header">Wed</div>
            <div class="day-header">Thu</div>
            <div class="day-header">Fri</div>
            <div class="day-header">Sat</div>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
    </div>

    <div id="detailModal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2 id="modalTitle">Add Detail</h2>
            <form id="detailForm">
                <input type="hidden" id="dateIdentifier">
                <input type="hidden" id="detailId">
                <label for="detailTitle">Title:</label>
                <input type="text" id="detailTitle" required>
                <label for="detailDescription">Description:</label>
                <textarea id="detailDescription" rows="4"></textarea>
                <label for="detailImage">Image URL (optional):</label>
                <input type="url" id="detailImage" placeholder="https://example.com/image.jpg">
                <button type="submit">Save Detail</button>
            </form>
        </div>
    </div>

    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>Customize Page</h2>
            <form id="settingsForm">
                <fieldset>
                    <legend>Top Panel</legend>
                    <label for="panelTitle">Panel Title:</label>
                    <input type="text" id="panelTitle">
                    <label for="panelDescription">Panel Description:</label>
                    <input type="text" id="panelDescription">
                    <label for="panelImageUpload">Upload Banner Image:</label>
                    <input type="file" id="panelImageUpload" accept="image/*">
                    <button type="button" id="removePanelImageBtn">Revert to Default Image</button>
                </fieldset>
                <fieldset>
                    <legend>Color Theme</legend>
                    <div class="theme-options">
                        <label><input type="radio" name="theme" value="default" checked> Default</label>
                        <label><input type="radio" name="theme" value="forest"> Forest</label>
                        <label><input type="radio" name="theme" value="ocean"> Ocean</label>
                        <label><input type="radio" name="theme" value="dusk"> Dusk</label>
                    </div>
                </fieldset>
                <fieldset>
                    <legend>Font Style</legend>
                    <label for="fontSelector">Page Font:</label>
                    <select id="fontSelector">
                        <option value="quicksand">Quicksand (Default)</option>
                        <option value="roboto-slab">Roboto Slab</option>
                        <option value="lora">Lora</option>
                        <option value="montserrat">Montserrat</option>
                    </select>
                </fieldset>
                <button type="submit">Save & Close</button>
            </form>
        </div>
    </div>
    <script src="calender.js"></script>
    <script src="../navbar/navbar.js"></script>
</body>
</html>
